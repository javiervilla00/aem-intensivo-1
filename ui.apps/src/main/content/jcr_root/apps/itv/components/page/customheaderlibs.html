<script>
(function() {
  var path = window.location.pathname.toLowerCase();
  var htmlTag = document.documentElement;
  if (path.indexOf('/mercedes') !== -1) {
    htmlTag.classList.add('theme-mercedes');
  } else if (path.indexOf('/audi') !== -1) {
    htmlTag.classList.add('theme-audi');
  } else if (path.indexOf('/bmw') !== -1) {
    htmlTag.classList.add('theme-bmw');
  } else if (path.indexOf('/lexus') !== -1) {
    htmlTag.classList.add('theme-lexus');
  }
})();
</script>
